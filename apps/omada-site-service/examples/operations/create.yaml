# Executable create template.
# Best used when WorkDrive already contains a finalized create.yaml or omada-plan.yaml.
version: 1

controller:
  organizationName: Opti-plex
  baseUrl: https://use1-omada-cloud.tplinkcloud.com/
  browserChannel: chromium
  headless: true

execution:
  stopOnError: true
  screenshots: true
  dryRun: false
  mutationMode: create

sites:
  - name: Building-Create-Example
    region: Canada
    timezone: America/Toronto
    scenario: Office
    lans:
      - name: "10"
        vlanId: 10
      - name: "20"
        vlanId: 20
    wlanGroups:
      - name: APT_101_AA
        ssids:
          - name: APT_101_AA
            security: wpa2_psk
            password: change-me-101
            vlanId: 10
      - name: APT_102_BB
        ssids:
          - name: APT_102_BB
            security: wpa2_psk
            password: change-me-102
            vlanId: 20
